services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME_DATABASE}
      POSTGRES_USER: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bot

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_IP: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bot

volumes:
  bot_postgres_data:

networks:
  bot:
    driver: bridge
